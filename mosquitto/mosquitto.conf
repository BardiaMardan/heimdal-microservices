# Heimdall dev broker (Phase 1).
listener 1883

# Phase 1 trusts the local network: any device may connect. Real device auth
# (mTLS + per-device credentials) is Phase 2 — see docs/adr/0002-mqtt-ingestion.md.
allow_anonymous true

# Persistence is what lets the backend survive a restart without losing data:
# QoS-1 messages for the persistent-session subscriber and retained status
# messages are written to disk and redelivered on reconnect.
persistence true
persistence_location /mosquitto/data/
autosave_interval 30
